version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: datalabel-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: datalabel
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7.2-alpine
    container_name: datalabel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mysql_data:
  redis_data: